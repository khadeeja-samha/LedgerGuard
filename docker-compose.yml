services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-ledgerguard_pass}
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-ledgerguard}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ledgerguard_pass}
      - POSTGRES_DB=${POSTGRES_DB:-ledgerguard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - neo4j
      - postgres
    environment:
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-ledgerguard_pass}
      - POSTGRES_URI=${POSTGRES_URI:-postgresql://${POSTGRES_USER:-ledgerguard}:${POSTGRES_PASSWORD:-ledgerguard_pass}@postgres:5432/${POSTGRES_DB:-ledgerguard}}
      - POSTGRES_URL=${POSTGRES_URL:-postgresql://${POSTGRES_USER:-ledgerguard}:${POSTGRES_PASSWORD:-ledgerguard_pass}@postgres:5432/${POSTGRES_DB:-ledgerguard}}
      - POSTGRES_USER=${POSTGRES_USER:-ledgerguard}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ledgerguard_pass}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-ledgerguard}
      - NIM_API_KEY=${NIM_API_KEY}
      - NIM_MODEL=${NIM_MODEL:-nvidia/nemotron-3-super-120b-a12b}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    restart: unless-stopped

volumes:
  neo4j_data:
  postgres_data:
